name: Bug Report
description: Report a bug
labels: ["type/bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to Reproduce
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      placeholder: e.g. v0.1.0 or commit hash
    validations:
      required: true
  - type: input
    id: go-version
    attributes:
      label: Go Version
      placeholder: e.g. 1.26.2
