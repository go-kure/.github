name: Audit Org Settings

on:
  push:
    branches: [main]
    paths:
      - 'governance/**'
      - 'standards/**'
  schedule:
    - cron: '0 6 * * *'  # Daily 6am UTC
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install yq
        env:
          YQ_VERSION: '4.44.6'
        run: |
          sudo curl -fsSL -o /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/download/v${YQ_VERSION}/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Audit all repos
        env:
          GH_TOKEN: ${{ secrets.SETTINGS_PAT }}
        run: bash scripts/github-settings.sh --all --ci --json 2>&1 | tee audit-output.txt || true

      - name: Post summary
        if: always()
        run: |
          [ -f github-settings-report.json ] || exit 0
          {
            echo "## Org Settings Audit"
            echo ""
            python3 - <<'EOF'
          import json
          with open("github-settings-report.json") as f:
              d = json.load(f)
          print("| Repo | Labels | Settings | Rulesets | Status |")
          print("|------|--------|----------|----------|--------|")
          for r in d.get("repos", []):
              issues = r["labels_missing"] + r["labels_renamed"] + r["settings_missing"] + r["rulesets_missing"]
              status = "OK" if issues == 0 else f"**{issues} issues**"
              lbl = f"{r['labels_ok']} ok"
              if r["labels_missing"]: lbl += f", **{r['labels_missing']} missing**"
              if r["labels_renamed"]: lbl += f", **{r['labels_renamed']} to rename**"
              sett = f"{r['settings_ok']} ok"
              if r["settings_missing"]: sett += f", **{r['settings_missing']} wrong**"
              rs = f"{r['rulesets_ok']} ok"
              if r["rulesets_missing"]: rs += f", **{r['rulesets_missing']} wrong**"
              print(f"| `{r['repo']}` | {lbl} | {sett} | {rs} | {status} |")
          EOF
            if grep -qE 'MISSING|WRONG|LEGACY|RENAME' audit-output.txt 2>/dev/null; then
              echo ""
              echo "## Issues"
              echo '```'
              grep -E 'Repository:|MISSING|WRONG|LEGACY|RENAME' audit-output.txt
              echo '```'
            fi
            echo ""
            echo "_Generated: $(date -u '+%Y-%m-%d %H:%M UTC')_"
          } >> $GITHUB_STEP_SUMMARY
