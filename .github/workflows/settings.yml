name: Org Settings

on:
  push:
    branches: [main]
    paths:
      - 'governance/**'
      - 'standards/**'
  schedule:
    - cron: '0 6 * * *'  # Daily 6am UTC
  workflow_dispatch:
    inputs:
      mode:
        description: "Mode: audit (dry-run, fails on issues) or apply (make changes)"
        default: audit
        required: true
        type: choice
        options:
          - audit
          - apply
      repo:
        description: "Repository name or 'all'"
        default: all
        required: false

jobs:
  settings:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Install yq
        env:
          YQ_VERSION: '4.44.6'
        run: |
          sudo curl -fsSL -o /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/download/v${YQ_VERSION}/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Run settings
        env:
          GH_TOKEN: ${{ secrets.SETTINGS_PAT }}
          INPUT_MODE: ${{ inputs.mode || 'audit' }}
          INPUT_REPO: ${{ inputs.repo || 'all' }}
        run: |
          set -o pipefail
          FLAGS="--ci --json"
          [ "$INPUT_MODE" = "apply" ] && FLAGS="$FLAGS --apply"
          if [ "$INPUT_REPO" = "all" ]; then
            bash scripts/github-settings.sh --all $FLAGS 2>&1 | tee settings-output.txt
          else
            bash scripts/github-settings.sh "$INPUT_REPO" $FLAGS 2>&1 | tee settings-output.txt
          fi

      - name: Post summary
        if: always()
        env:
          INPUT_MODE: ${{ inputs.mode || 'audit' }}
        run: |
          [ -f github-settings-report.json ] || exit 0
          {
            echo "## Org Settings — ${INPUT_MODE}"
            echo ""
            python3 - <<'EOF'
          import json
          with open("github-settings-report.json") as f:
              d = json.load(f)
          print("| Repo | Labels | Settings | Rulesets | Status |")
          print("|------|--------|----------|----------|--------|")
          for r in d.get("repos", []):
              issues = r["labels_missing"] + r["labels_renamed"] + r.get("labels_extra", 0) + r["settings_missing"] + r["rulesets_missing"]
              status = "OK" if issues == 0 else f"**{issues} issues**"
              lbl = f"{r['labels_ok']} ok"
              if r["labels_missing"]: lbl += f", **{r['labels_missing']} missing**"
              if r["labels_renamed"]: lbl += f", **{r['labels_renamed']} to rename**"
              if r.get("labels_extra", 0): lbl += f", **{r['labels_extra']} extra**"
              sett = f"{r['settings_ok']} ok"
              if r["settings_missing"]: sett += f", **{r['settings_missing']} wrong**"
              rs = f"{r['rulesets_ok']} ok"
              if r["rulesets_missing"]: rs += f", **{r['rulesets_missing']} wrong**"
              print(f"| `{r['repo']}` | {lbl} | {sett} | {rs} | {status} |")
          EOF
            if grep -qE 'MISSING|WRONG|LEGACY|RENAME|EXTRA|SKIP|CREATING|RENAMING|SETTING|UPDATING|DELETING' settings-output.txt 2>/dev/null; then
              echo ""
              echo "## Changes"
              echo '```'
              grep -E 'Repository:|MISSING|WRONG|LEGACY|RENAME|EXTRA|SKIP|CREATING|RENAMING|SETTING|UPDATING|DELETING|BLOCKED' settings-output.txt
              echo '```'
            fi
            echo ""
            echo "_Generated: $(date -u '+%Y-%m-%d %H:%M UTC')_"
          } >> $GITHUB_STEP_SUMMARY
