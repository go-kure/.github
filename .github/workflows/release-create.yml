name: Release / Create

on:
  workflow_call:
    inputs:
      dry_run:
        description: 'Dry run (preview only, no changes)'
        required: false
        type: boolean
        default: false
      type:
        description: 'Deprecated — ignored, type is auto-inferred from VERSION'
        required: false
        type: string
        default: ''
      scope:
        description: 'Deprecated — ignored, use release-bump.yml for version bumps'
        required: false
        type: string
        default: ''

concurrency:
  group: release-create
  cancel-in-progress: false

jobs:
  test:
    name: Pre-release CI check
    runs-on: autops-kube-kure
    timeout-minutes: 35
    permissions:
      contents: read
      actions: read
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Verify CI passed on HEAD
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          SHA=$(git rev-parse HEAD)
          echo "Waiting for CI to pass on $SHA..."

          for i in $(seq 1 180); do
            STATUS=$(gh run list \
              --repo "$GITHUB_REPOSITORY" \
              --workflow ci.yml \
              --commit "$SHA" \
              --json conclusion,status \
              --limit 1 \
              --jq '.[0] | if .status == "completed" then .conclusion else "in_progress" end // empty')

            if [ "$STATUS" = "success" ]; then
              echo "CI passed on $SHA."
              exit 0
            elif [ -n "$STATUS" ] && [ "$STATUS" != "in_progress" ]; then
              echo "::error::CI did not pass on $SHA (conclusion: $STATUS). Cannot tag."
              exit 1
            fi

            [ $((i % 6)) -eq 0 ] && echo "Still waiting for CI... ${i}0s elapsed (attempt $i/180)"
            sleep 10
          done

          echo "::error::CI did not complete within 30 minutes for $SHA."
          exit 1

  release:
    name: Create Release
    needs: test
    runs-on: autops-kube-kure
    timeout-minutes: 60
    permissions:
      contents: write
      actions: read
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - name: Check out code
        uses: actions/checkout@v6
        with:
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0

      - name: Install git-cliff
        run: |
          CLIFF_VERSION="2.7.0"
          curl -sSfL "https://github.com/orhun/git-cliff/releases/download/v${CLIFF_VERSION}/git-cliff-${CLIFF_VERSION}-x86_64-unknown-linux-gnu.tar.gz" \
            | tar xzf - -C /tmp
          sudo install /tmp/git-cliff-${CLIFF_VERSION}/git-cliff /usr/local/bin/

      - name: Run release script
        env:
          DRY_RUN: ${{ inputs.dry_run && '1' || '0' }}
          CI: 'true'
        run: ./scripts/release.sh

      - name: Wait for release workflow to complete
        if: ${{ !inputs.dry_run }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG=$(git describe --tags --abbrev=0)
          echo "Waiting for release workflow for tag $TAG..."

          RUN_ID=""
          for i in $(seq 1 24); do
            RUN_ID=$(gh run list \
              --repo "$GITHUB_REPOSITORY" \
              --workflow release-publish.yml \
              --branch "$TAG" \
              --json databaseId \
              --limit 1 \
              --jq '.[0].databaseId // empty' 2>/dev/null || true)
            [ -n "$RUN_ID" ] && break
            echo "Attempt $i/24: not started yet, retrying in 5s..."
            sleep 5
          done

          if [ -z "$RUN_ID" ]; then
            echo "::error::release-publish.yml did not start within 2 minutes for tag $TAG"
            exit 1
          fi

          echo "Watching run $RUN_ID..."
          for i in $(seq 1 270); do
            CONCLUSION=$(gh run view "$RUN_ID" \
              --repo "$GITHUB_REPOSITORY" \
              --json status,conclusion \
              --jq 'if .status == "completed" then .conclusion else "in_progress" end' \
              2>/dev/null || true)
            if [ -z "$CONCLUSION" ]; then
              [ $((i % 6)) -eq 0 ] && echo "Still waiting for release... ${i}0s elapsed"
              sleep 10
              continue
            fi
            if [ "$CONCLUSION" = "success" ]; then
              echo "Release workflow completed successfully."
              exit 0
            elif [ "$CONCLUSION" != "in_progress" ]; then
              echo "::error::Release workflow failed (conclusion: $CONCLUSION)."
              exit 1
            fi
            [ $((i % 6)) -eq 0 ] && echo "Still waiting for release... ${i}0s elapsed"
            sleep 10
          done
          echo "::error::Release workflow did not complete within 45 minutes for tag $TAG."
          exit 1
