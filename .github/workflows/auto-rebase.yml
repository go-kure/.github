name: Auto-Rebase

on:
  workflow_call:

concurrency:
  group: auto-rebase
  cancel-in-progress: true

jobs:
  auto-rebase:
    name: auto-rebase
    runs-on: autops-kube
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Rebase open PRs
        uses: peter-evans/rebase@v4
        with:
          token: ${{ secrets.AUTO_REBASE_PAT }}
          base: main
          exclude-labels: dependencies
          exclude-drafts: true
