name: Apply Org Settings

on:
  workflow_dispatch:
    inputs:
      repo:
        description: "Repository name, or 'all'"
        default: all
        required: true
      dry_run:
        description: Dry run — audit only, no changes
        type: boolean
        default: true
        required: false

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install yq
        env:
          YQ_VERSION: '4.44.6'
        run: |
          sudo curl -fsSL -o /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/download/v${YQ_VERSION}/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Apply settings
        env:
          GH_TOKEN: ${{ secrets.SETTINGS_PAT }}
        run: |
          FLAGS="--ci"
          [ "${{ inputs.dry_run }}" = "false" ] && FLAGS="$FLAGS --apply"
          if [ "${{ inputs.repo }}" = "all" ]; then
            bash scripts/github-settings.sh --all $FLAGS
          else
            bash scripts/github-settings.sh "${{ inputs.repo }}" $FLAGS
          fi
