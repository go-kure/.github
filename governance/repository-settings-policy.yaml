# GitHub repository settings for go-kure organization
# Applied by scripts/github-settings.sh

github_defaults:
  allow_rebase_merge: true
  allow_squash_merge: false
  allow_merge_commit: false
  delete_branch_on_merge: true
  allow_update_branch: true
  has_wiki: false
  allow_auto_merge: false
  has_projects: true
  rulesets:
    main-protection:
      target: branch
      enforcement: active
      conditions:
        ref_name:
          include: ["refs/heads/main"]
      rules:
        deletion: true
        non_fast_forward: true
        required_linear_history: true
        pull_request:
          required_approving_review_count: 0
          dismiss_stale_reviews_on_push: false
          require_code_owner_review: false
          require_last_push_approval: false
          required_review_thread_resolution: true
        required_status_checks:
          strict: true
          contexts:
            - lint
            - test
            - build
            - rebase-check
      # Default: no bypass actors

github_repos:
  # .github: no overrides (uses defaults: rebase-check + strict + no merge queue)
  #
  # kure and launcher both use a merge queue with the SAME rule override block.
  # auto-merge is intentionally left at the default (false): the sole maintainer
  # reviews every PR and clicks "Merge when ready" manually; the queue then
  # handles the rebase + merged-result test + linear land. Revisit if fire-and-
  # forget auto-merge is wanted later (set allow_auto_merge: true per repo).
  kure:
    rulesets:
      main-protection:
        bypass_actors:
          # kure-release-bot GitHub App (app_id: 2882845)
          - actor_id: 2882845
            actor_type: Integration
            bypass_mode: always
        # Per-repo rule overrides: the merge queue tests the real merged result,
        # so rebase-check and strict up-to-date enforcement are no longer needed.
        rules:
          required_status_checks:
            strict: false
            contexts:
              - lint
              - test
              - build
          merge_queue:
            merge_method: REBASE                 # preserves linear history
            grouping_strategy: ALLGREEN          # drop any failing entry from the group
            min_entries_to_merge: 1              # conservative sizing
            max_entries_to_merge: 1
            max_entries_to_build: 1              # tune up after observing runner load
            min_entries_to_merge_wait_minutes: 0
            check_response_timeout_minutes: 60
  launcher:
    rulesets:
      main-protection:
        bypass_actors:
          # kure-release-bot GitHub App (app_id: 2882845)
          - actor_id: 2882845
            actor_type: Integration
            bypass_mode: always
        # Same merge-queue override as kure (no auto-merge).
        rules:
          required_status_checks:
            strict: false
            contexts:
              - lint
              - test
              - build
          merge_queue:
            merge_method: REBASE
            grouping_strategy: ALLGREEN
            min_entries_to_merge: 1
            max_entries_to_merge: 1
            max_entries_to_build: 1
            min_entries_to_merge_wait_minutes: 0
            check_response_timeout_minutes: 60
